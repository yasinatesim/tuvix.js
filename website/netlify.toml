# netlify.toml — Tuvix.js Docs
#
# Netlify dashboard settings (set these in Site > Build & Deploy > Build settings):
#   Base directory:    website
#   Build command:     (leave empty — defined here)
#   Publish directory: (leave empty — defined here)
#
[build]
  base    = "."
  command = "pnpm install --frozen-lockfile && pnpm build"
  publish = ".vitepress/dist"

[build.environment]
  NODE_VERSION = "20"

# ── Preview deployments (PRs) ──────────────────────────────────────
[context.deploy-preview]
  command = "pnpm install --frozen-lockfile && pnpm build"

# ── Branch deploys (e.g. beta branch) ─────────────────────────────
[context.branch-deploy]
  command = "pnpm install --frozen-lockfile && pnpm build"

# ── Headers ───────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "no-referrer-when-downgrade"
    # Cache static assets aggressively (VitePress hashes them)
    Cache-Control          = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── VitePress already generates clean HTML files — no SPA fallback needed ──
# But keep a 404 fallback just in case
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
