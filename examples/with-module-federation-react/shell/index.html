<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tuvix.js — Module Federation Shell</title>
  </head>
  <body style="margin: 0; background: #0f0f1a; color: #e0e0e0; font-family: system-ui;">
    <div style="max-width: 900px; margin: 40px auto; padding: 0 24px;">
      <h1 style="margin-bottom: 24px;">🌐 Webpack Module Federation Example</h1>
      <p style="margin-bottom: 32px; color: #aaa;">This Vite shell dynamically loads two Webpack 5 remotes over the network.</p>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
        <div id="remote1-container"></div>
        <div id="remote2-container"></div>
      </div>
    </div>
    
    <script type="module" src="/src/shell.ts"></script>
  </body>
</html>
