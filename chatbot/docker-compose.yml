version: "3.8"
services:
  # Main chatbot API server
  chatbot:
    build:
      context: ..
      dockerfile: chatbot/Dockerfile
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MODEL_NAME=${MODEL_NAME:-minimax/minimax-m2.5:free}
      - EMBED_MODEL=${EMBED_MODEL:-qwen/qwen3-embedding-0.6b:free}
      - CHROMA_URL=http://chromadb:8000
      - PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "3001:3001"
    depends_on:
      chromadb:
        condition: service_started
      chatbot-seed:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - dokploy-network

  # Seeds dataset into ChromaDB on first boot, then exits
  # Clears and re-seeds so embedding model changes take effect cleanly
  chatbot-seed:
    build:
      context: ..
      dockerfile: chatbot/Dockerfile
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - EMBED_MODEL=${EMBED_MODEL:-qwen/qwen3-embedding-0.6b:free}
      - CHROMA_URL=http://chromadb:8000
    depends_on:
      chromadb:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "⏳ Clearing old ChromaDB collection..."
        cd /app && tsx chatbot/data/seed-clear.ts
        echo "⏳ Seeding dataset into ChromaDB via OpenRouter embeddings..."
        tsx chatbot/data/seed.ts
        echo "✅ Dataset seeded!"
    restart: "no"
    networks:
      - dokploy-network

  # ChromaDB vector database
  # Pinned to 0.6.3 — compatible with chromadb@1.9.x npm client (1.x server changed the API)
  chromadb:
    image: chromadb/chroma:0.6.3
    volumes:
      - chromadb_data:/chroma/chroma
    restart: unless-stopped
    networks:
      - dokploy-network

volumes:
  chromadb_data:

networks:
  dokploy-network:
    external: true
    name: dokploy-network
