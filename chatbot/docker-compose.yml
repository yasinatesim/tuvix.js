version: "3.8"
services:
  # Main chatbot API server
  chatbot:
    build:
      context: ..
      dockerfile: chatbot/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_URL=http://chromadb:8000
      - MODEL_NAME=qwen2.5-coder:7b
      - EMBED_MODEL=nomic-embed-text
      - PORT=3001
      - OLLAMA_TIMEOUT_MS=120000
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      chromadb:
        condition: service_healthy
      ollama-setup:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/3001' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Auto-pulls Ollama models on first boot, then exits
  ollama-setup:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "⏳ Pulling embedding model..."
        OLLAMA_HOST=http://ollama:11434 ollama pull nomic-embed-text
        echo "⏳ Pulling code generation model (this may take a while)..."
        OLLAMA_HOST=http://ollama:11434 ollama pull qwen2.5-coder:7b
        echo "✅ All models ready!"

  # Seeds dataset into ChromaDB on first boot, then exits
  chatbot-seed:
    build:
      context: ..
      dockerfile: chatbot/Dockerfile
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_URL=http://chromadb:8000
      - EMBED_MODEL=nomic-embed-text
    depends_on:
      chatbot:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "⏳ Seeding dataset into ChromaDB..."
        cd /app && tsx data/seed.ts
        echo "✅ Dataset seeded!"
    restart: "no"

  # Ollama LLM server (no host port — only reachable within Docker network)
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ChromaDB vector database (no host port — only reachable within Docker network)
  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chromadb_data:/chroma/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  chromadb_data:
  ollama_data:
