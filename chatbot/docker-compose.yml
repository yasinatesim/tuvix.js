version: "3.8"
services:
  # Main chatbot API server
  chatbot:
    build:
      context: ..
      dockerfile: chatbot/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_URL=http://chromadb:8000
      - MODEL_NAME=qwen2.5-coder:7b
      - EMBED_MODEL=nomic-embed-text
      - PORT=3001
      - OLLAMA_TIMEOUT_MS=120000
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      chromadb:
        condition: service_started
      ollama-setup:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        node -e "
        const http = require('http');
        let n = 0;
        (function check() {
          n++;
          process.stdout.write('\u23f3 Waiting for ChromaDB (attempt ' + n + ')...\n');
          http.get('http://chromadb:8000/api/v1/heartbeat', function(r) {
            process.stdout.write('\u2705 ChromaDB ready!\n');
            process.exit(0);
          }).on('error', function() { setTimeout(check, 3000); });
        })();
        " && node dist/server.js
    restart: unless-stopped

  # Auto-pulls Ollama models on first boot, then exits
  ollama-setup:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "⏳ Pulling embedding model..."
        OLLAMA_HOST=http://ollama:11434 ollama pull nomic-embed-text
        echo "⏳ Pulling code generation model (this may take a while)..."
        OLLAMA_HOST=http://ollama:11434 ollama pull qwen2.5-coder:7b
        echo "✅ All models ready!"

  # Seeds dataset into ChromaDB on first boot, then exits
  chatbot-seed:
    build:
      context: ..
      dockerfile: chatbot/Dockerfile
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_URL=http://chromadb:8000
      - EMBED_MODEL=nomic-embed-text
    depends_on:
      chromadb:
        condition: service_started
      ollama-setup:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "⏳ Seeding dataset into ChromaDB..."
        cd /app && tsx data/seed.ts
        echo "✅ Dataset seeded!"
    restart: "no"

  # Ollama LLM server (no host port — only reachable within Docker network)
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # ChromaDB vector database (no host port — only reachable within Docker network)
  # Pinned to 0.6.3 — compatible with chromadb@1.9.x npm client (1.x server changed the API)
  chromadb:
    image: chromadb/chroma:0.6.3
    volumes:
      - chromadb_data:/chroma/chroma
    restart: unless-stopped

  # Cloudflare Tunnel — exposes chatbot API publicly without opening ports
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - chatbot
    restart: unless-stopped

volumes:
  chromadb_data:
  ollama_data:
